<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Patients</title>
    </head>
<body>
    <img src="Assets/Logo4.png" alt="National Stroke Insurance" width="100">
    <div class="table-container">
        <h1>Patient Records</h1>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Actions</th>
            </tr>
            {% for patient in patients %}
            <tr>
                <td>{{ patient.id }}</td>
                <td>{{ patient.name }}</td>
                <td>{{ patient.age }}</td>
                <td>{{ patient.gender }}</td>
                <td class="actions">
                    <a href="Update.html">Update</a>
                    <a href="Delete.html" class="delete">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
        <a href="Add_Patient.html" class="add-patient-btn">Add New Patient</a>
    </div>
    <footer>
       <p>&copy; 2025 National Stroke Insurance WebApp. All rights reserved.
    </footer>
</body>
</html>
