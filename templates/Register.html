<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>/* The body of the web page is being styled with the code*/
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #b5a6b5;
            margin: 0;
            padding: 0;
             /* The header(the upper part of the body of the web page) 
        of the web page is being styled with the code*/
        
        }
        header {
            background-color: #0056b3;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        /* This styling and shaping the registering box*/
        .register-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: 30px auto;
        }

        .register-container h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: brown;
        }

        .register-container form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .register-container input {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease-in-out;
        }

        .register-container input:focus {
            border-color: #3498db;
        }

        .register-container button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }

        .register-container button:hover {
            background-color: rgb(47, 255, 123);
        }

        .register-container p {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .register-container a {
            color: #3498db;
            font-weight: bold;
            text-decoration: none;
        }

        .register-container a:hover {
            text-decoration: underline;
        }
        footer {
            text-align: center;
            background-color: #333;
            color: white;
            padding: 15px 0;
            margin-top: 40px;
            font-size: 0.9rem;

            footer {
            margin: 0;
         }
       
       
        }
   /*Responsive design style to match buttons  and container with screen size of different devices*/
       @media (max-width: 600px) {
            button {
                flex: 1 1 100%;
                max-width: 100%;
          }
        }
    </style>
        
</head>
<body>
   <header> 
    <h1>Welcome to National Stroke Insurance</h1>
    <img src="/static/Assets/Logo4.png" alt="National Stroke Insurance" width="100">
   </header>
    <div class="register-container">
        <h2>Register</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="Login.html">Login here</a></p>
        <a href="index.html">Back to Home</a>
    </div>   
        
        <footer>
        <p>&copy; 2025 National Stroke Insurance WebApp. All rights reserved.</p>
    </footer>
    
</body>
</html>
