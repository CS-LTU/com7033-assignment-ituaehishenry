<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>National Stroke Insurance - Add Data </title>
  
</head>
<body>
  <h1>Welcome to National Stroke Insurance</h1>
  <img src="Assets/Logo4.png" alt="National Stroke Insurance" width="100">
  
  <div class = "form-container">
    <h2> Add Patient </h2>
    <form action="/Add_Patient" method="POST">
        <input type= "number" name="id" placeholder="Patient ID" required>
        <input type= "text" name="name" placeholder="Name" required>
        <input type= "number" name="age" placeholder="Age" required>
        <input type= "text" name="gender" placeholder="Gender" required>
        <input type= "number" name="hypertension" placeholder="Hypertension (0/1)" required>
        <input type= "number" name="heart disease" placeholder="Heart Disease (0/1)" required>
        <input type= "text" name="ever_married" placeholder="Ever Married" required>
        <input type= "text" name="work_type" placeholder="Work Type" required>
        <input type= "text" name="type_residence" placeholder="Residence Type (0/1)" required>
        <input type= "number" step="0.01" name="avg_glucose_level" placeholder="Avg Glucose Level" required>
        <input type= "number" step="0.01" name="bmi" placeholder="BMI" required>
        <input type= "text" name="smoking status" placeholder="Smoking Status" required>
        <input type= "number" name="stroke" placeholder="Stroke (0/1)" required>
        <button type="Submit">Add Patient to record</button>

    </form>
    <p class=" form-container"> All fields in the form are required. </p>   

  </div> 
<footer>
      <p>&copy; 2025 National Stroke Insurance WebApp. All rights reserved.</p>
</footer>
</body>
</html>
